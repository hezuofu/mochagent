version: '3.8'
services:
  mochaagent:
    build: .
    ports:
      - "8080:8080"
    environment:
      - MOCHA_MODEL=deepseek-chat
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ~/.mocha:/root/.mocha
      - .:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - local

volumes:
  ollama_data:
